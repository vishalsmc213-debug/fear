<div class="modal-overlay" id="projectModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="mTitle" style="color: var(--neon-cyan);">Project Details</h2>
        
        <div class="project-details">
            <div class="detail-box">
                <h4>3D Perspective</h4>
                <div class="placeholder-img">[ 3D Visual ]</div>
            </div>
            <div class="detail-box">
                <h4>Circuit & Pin Connections</h4>
                <div class="placeholder-img">[ Diagram ]</div>
            </div>

            <div class="step-instructions" style="grid-column: span 2; border: 1px dashed var(--neon-green); text-align: center;">
                <h3 style="color: var(--neon-green);">Pay ₹10 to Unlock Step-by-Step Guide & Code</h3>
                <p>கீழே உள்ள QR-ஐ ஸ்கேன் செய்து பணம் செலுத்திய பின் "I have Paid" பட்டனை கிளிக் செய்யவும்.</p>
                
                <div style="background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 15px 0;">
                    <img src="qr.png" alt="Payment QR" style="width: 200px; height: auto;">
                </div>
                
                <br>
                <button class="btn-buy" style="background: var(--neon-green); color: black; width: 250px;" onclick="verifyPayment()">I have Paid - Unlock Now</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Payment Verification Simulation
    function verifyPayment() {
        alert("Verification request sent! உங்கள் பணம் செலுத்திய விபரம் சரிபார்க்கப்பட்டதும் 5 நிமிடங்களில் Code மற்றும் Instructions அன்லாக் செய்யப்படும்.");
        closeModal();
    }
    
    // முந்தைய function-களை அப்படியே வைத்துக்கொள்ளவும்
    function openProject(title, desc) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('projectModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('projectModal').style.display = 'none';
    }
</script>
